# Filebeat configuration for Windows
# This is a Windows-specific version that uses Windows Event Logs

filebeat.inputs:
  # Windows Event Logs - Use winlogbeat for better Windows Event Log support
  # For file-based logs, use filestream below
  
  # SSH logs (if SSH server is installed on Windows)
  - type: filestream
    enabled: true
    id: ssh-logs-windows
    paths:
      - C:\ProgramData\ssh\logs\*.log
      - C:\OpenSSH-Win64\logs\*.log
    fields:
      log_type: ssh
    fields_under_root: false

  # Apache/Nginx logs on Windows
  - type: filestream
    enabled: true
    id: web-logs-windows
    paths:
      - C:\Apache24\logs\access.log
      - C:\Apache24\logs\error.log
      - C:\nginx\logs\access.log
      - C:\nginx\logs\error.log
    fields:
      log_type: web
    fields_under_root: false

  # IIS logs (Windows native web server)
  - type: filestream
    enabled: true
    id: iis-logs
    paths:
      - C:\inetpub\logs\LogFiles\*\*.log
    fields:
      log_type: web
    fields_under_root: false

  # Windows System logs (better to use winlogbeat)
  # For Windows Event Logs, use winlogbeat instead of filebeat
  # Example winlogbeat config:
  # winlogbeat.event_logs:
  #   - name: System
  #   - name: Application
  #   - name: Security

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded

# Output to Logstash
output.logstash:
  hosts: ["elk-server-ip:5044"]  # Replace with your ELK server IP

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: logs
  name: filebeat
  keepfiles: 7
