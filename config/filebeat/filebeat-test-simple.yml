filebeat.inputs:
  - type: filestream
    id: test-logs-simple
    enabled: true
    paths:
      - C:/Users/thuan/Documents/test.log
    prospector.scanner.fingerprint.offset: 0
    prospector.scanner.fingerprint.length: 64
    fields:
      log_type: ssh
    fields_under_root: false

output.logstash:
  hosts: ["127.0.0.1:5044"]
