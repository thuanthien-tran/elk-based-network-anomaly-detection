filebeat.inputs:
  # File log demo (Windows) - doc tai C:\Users\thuan\Documents\test.log
  - type: filestream
    enabled: true
    id: test-log-windows
    paths:
      - C:/Users/thuan/Documents/test.log
    fields:
      log_type: ssh
    fields_under_root: false
    parsers:
      - multiline:
          pattern: '^[A-Z][a-z]{2}\s+\d{1,2}\s'
          negate: true
          match: after

  # SSH logs - Using filestream (new in Filebeat 7.14+)
  - type: filestream
    enabled: true
    id: ssh-logs
    paths:
      # Linux/Unix paths
      - /var/log/auth.log
      # Windows paths (uncomment and adjust as needed)
      # - C:\Windows\System32\LogFiles\Security\*.evt
      # - C:\ProgramData\ssh\logs\*.log
    fields:
      log_type: ssh
    fields_under_root: false
    parsers:
      - multiline:
          pattern: '^[A-Z][a-z]{2}\s+\d{1,2}\s'
          negate: true
          match: after

  # Apache access logs - Using filestream
  - type: filestream
    enabled: true
    id: apache-access
    paths:
      # Linux/Unix paths
      - /var/log/apache2/access.log
      - /var/log/httpd/access_log
      # Windows paths (if using Apache on Windows)
      # - C:\Apache24\logs\access.log
    fields:
      log_type: web
    fields_under_root: false

  # Apache error logs - Using filestream
  - type: filestream
    enabled: true
    id: apache-error
    paths:
      # Linux/Unix paths
      - /var/log/apache2/error.log
      - /var/log/httpd/error_log
      # Windows paths
      # - C:\Apache24\logs\error.log
    fields:
      log_type: web_error
    fields_under_root: false

  # Nginx access logs (if using Nginx instead of Apache)
  # - type: filestream
  #   enabled: true
  #   id: nginx-access
  #   paths:
  #     - /var/log/nginx/access.log
  #   fields:
  #     log_type: web
  #   fields_under_root: false

  # System logs - Using filestream
  - type: filestream
    enabled: true
    id: system-logs
    paths:
      # Linux/Unix paths
      - /var/log/syslog
      - /var/log/messages
      # Windows Event Logs (use winlogbeat for better Windows support)
      # For Windows, consider using winlogbeat instead
    fields:
      log_type: system
    fields_under_root: false
    exclude_lines: ['^#']  # Exclude comment lines

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# Output to Logstash
output.logstash:
  hosts: ["localhost:5044"]  # Replace with your ELK server IP

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: logs
  name: filebeat
  keepfiles: 7
  permissions: 0644
