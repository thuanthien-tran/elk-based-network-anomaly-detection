# Filebeat test configuration for Windows
# This config creates test logs and monitors them

filebeat.inputs:
  # Test log input - monitors a test file in the current directory
  - type: filestream
    enabled: true
    id: test-logs
    paths:
      - test-logs\*.log
      - test-logs\*.txt
    fields:
      log_type: test
    fields_under_root: false

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded

# Output to Logstash (update with your ELK server IP)
output.logstash:
  hosts: ["localhost:5044"]  # Change to your ELK server IP

# Alternative: Output to console for testing
# output.console:
#   pretty: true

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: logs
  name: filebeat
  keepfiles: 7
