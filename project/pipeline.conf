input {
  beats {
    port => 5044
  }
}

filter {
  # Parse SSH authentication logs
  if [fields][log_type] == "ssh" {
    grok {
      match => { 
        "message" => "%{SYSLOGTIMESTAMP:timestamp} %{IPORHOST:hostname} sshd\[%{NUMBER:pid}\]: %{GREEDYDATA:ssh_message}"
      }
    }
    
    # Parse SSH login attempts
    if [ssh_message] =~ /Failed password/ {
      grok {
        match => { 
          "ssh_message" => "Failed password for (?:invalid user )?%{USER:user} from %{IP:source_ip} port %{NUMBER:port}"
        }
      }
      mutate {
        add_field => { "attack_type" => "brute_force" }
        add_field => { "status" => "failed" }
        add_field => { "is_attack" => true }
        add_field => { "severity" => "medium" }
      }
    }
    
    if [ssh_message] =~ /Accepted password/ {
      grok {
        match => { 
          "ssh_message" => "Accepted password for %{USER:user} from %{IP:source_ip} port %{NUMBER:port}"
        }
      }
      mutate {
        add_field => { "status" => "success" }
      }
    }
    
    # Parse timestamp
    date {
      match => [ "timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
    
    # Add geoip information
    geoip {
      source => "source_ip"
      target => "geoip"
    }
  }
  
  # Parse Apache/Nginx web logs
  if [fields][log_type] == "web" {
    grok {
      match => { 
        "message" => "%{COMBINEDAPACHELOG}"
      }
    }
    
    # Detect SQL injection attempts (improved regex)
    if [request] =~ /(?i)(union\s+(all\s+)?select|select\s+.*\s+from|insert\s+into|delete\s+from|drop\s+(table|database)|exec\s*\(|script\s*=|(\%27|')(\s|%20)*(or|and)(\s|%20)+[\w]+(\s|%20)*=(\s|%20)*[\w]+)/ {
      mutate {
        add_field => { "attack_type" => "sql_injection" }
        add_field => { "is_attack" => true }
        add_field => { "severity" => "high" }
      }
    }
    
    # Detect XSS attempts
    if [request] =~ /(?i)(<script|javascript:|onerror=|onload=|onclick=|onmouseover=)/ {
      mutate {
        add_field => { "attack_type" => "xss" }
        add_field => { "is_attack" => true }
        add_field => { "severity" => "high" }
      }
    }
    
    # Detect suspicious paths
    if [request] =~ /(\/admin|\/wp-admin|\/etc\/passwd|\/\.\.\/|\.\.\/\.\.\/)/ {
      mutate {
        add_field => { "attack_type" => "path_traversal" }
        add_field => { "is_attack" => true }
        add_field => { "severity" => "medium" }
      }
    }
    
    # Rate-based detection: Multiple failed logins from same IP
    # This requires aggregating in Elasticsearch or using a separate filter
    # For now, we'll tag it here and aggregate later
    
    # Parse timestamp
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }
    
    # Add geoip information
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }
  
  # Parse system logs
  if [fields][log_type] == "system" {
    grok {
      match => { 
        "message" => "%{SYSLOGLINE}"
      }
    }
    
    date {
      match => [ "timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }
  
  # Rate-based detection for SSH brute force
  # Count failed logins per IP in a time window (requires Elasticsearch aggregation)
  # Tag high-frequency failed logins
  if [attack_type] == "brute_force" and [status] == "failed" {
    mutate {
      add_tag => [ "brute_force_attempt" ]
    }
  }
  
  # Add common fields
  mutate {
    add_field => { "processed_at" => "%{@timestamp}" }
  }
  
  # Ensure is_attack is boolean (not string)
  if [is_attack] == "true" {
    mutate {
      convert => { "is_attack" => "boolean" }
    }
  }
  
  if [is_attack] == "false" {
    mutate {
      convert => { "is_attack" => "boolean" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[fields][log_type]}-logs-%{+YYYY.MM.dd}"
  }
  
  # Uncomment for debugging
  # stdout {
  #   codec => rubydebug
  # }
}
